{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl border-t-4 border-cyan-500">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tight mb-1">Ustaw nowe hasło</h2>
            <p class="text-slate-400 text-sm">
                Wpisz kod z maila i nowe hasło. Kod jest ważny przez 15 minut.
            </p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="form-label">Adres e-mail:</label>
                <input type="email" name="email" required value="{{ email }}" placeholder="twoj@email.pl" class="form-input" autocomplete="email">
            </div>

            <div>
                <label class="form-label">Kod z maila:</label>
                <input type="text" name="code" required inputmode="numeric" maxlength="6" placeholder="123456" class="form-input">
            </div>

            <div>
                <label class="form-label">Nowe hasło:</label>
                <input type="password" name="new_password" required placeholder="Nowe hasło" class="form-input" autocomplete="new-password">
            </div>

            <div>
                <label class="form-label">Powtórz nowe hasło:</label>
                <input type="password" name="password_confirm" required placeholder="Powtórz hasło" class="form-input" autocomplete="new-password">
            </div>

            <button type="submit" class="btn-primary w-full py-3">
                Zmień hasło
            </button>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-800 text-center text-sm text-slate-400">
            {% if email %}
                <form method="POST" action="{% url 'forgot_password_stage1' %}" class="space-y-3">
                    {% csrf_token %}
                    <input type="hidden" name="email" value="{{ email }}">
                    <button type="submit" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">
                        Wyślij kod ponownie
                    </button>
                </form>
            {% else %}
                Nie masz kodu?
                <a href="{% url 'forgot_password_stage1' %}" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">Wyślij nowy kod</a>
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
