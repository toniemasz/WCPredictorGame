{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black tracking-tight">Utwórz Konto</h2>
            <p class="text-slate-400 text-xs sm:text-sm mt-1">Dołącz do zabawy i walcz o miano eksperta.</p>
        </div>

        <form method="POST" class="space-y-4" enctype="multipart/form-data">
            {% csrf_token %}

            {% if form.errors %}
            <div class="p-3 bg-red-500/20 border border-red-500/40 rounded-xl text-xs text-red-400 font-medium">
                {% for field, errors in form.errors.items %}
                    {{ errors|striptags }}
                {% endfor %}
            </div>
            {% endif %}

            <div>
                <label class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" required placeholder="Wybierz nick" class="form-input">
            </div>

            <div>
                <label class="form-label">Adres E-mail (opcjonalnie):</label>
                <input type="email" name="email" placeholder="twoj@email.com" class="form-input">
            </div>

            <div>
                <label class="form-label">Hasło:</label>
                <input type="password" name="password" required placeholder="Minimum 8 znaków" class="form-input">
            </div>

            <div>
                <label class="form-label">Powtórz hasło:</label>
                <input type="password" name="password_confirm" required placeholder="Powtórz hasło" class="form-input">
            </div>

            <div>
                <label class="form-label">Avatar (opcjonalnie):</label>
                <input type="file" name="avatar" accept="image/*" class="form-input text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-cyan-500 file:text-white hover:file:bg-cyan-600">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3">
                    Zarejestruj się
                </button>
            </div>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800 text-center text-sm text-slate-400">
            Masz już konto? <a href="/login/" class="text-cyan-400 font-bold hover:underline">Zaloguj się</a>
        </div>
    </div>
</div>
{% endblock %}
