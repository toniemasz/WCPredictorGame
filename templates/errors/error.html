<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wystąpił błąd</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #020617;
            --panel: #0f172a;
            --panel-border: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --accent: #22d3ee;
            --accent-dark: #0891b2;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: radial-gradient(circle at top, #0f172a 0, var(--bg) 44%);
            color: var(--text);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        main {
            width: min(100%, 680px);
            padding: clamp(28px, 6vw, 56px);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            background: rgba(15, 23, 42, 0.86);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
            text-align: center;
        }

        .status {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 74px;
            height: 36px;
            margin-bottom: 24px;
            border: 1px solid rgba(34, 211, 238, 0.28);
            border-radius: 999px;
            color: var(--accent);
            background: rgba(34, 211, 238, 0.08);
            font-size: 13px;
            font-weight: 800;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 0 0 16px;
            font-size: clamp(32px, 7vw, 58px);
            line-height: 1;
            letter-spacing: 0;
        }

        p {
            margin: 0 auto;
            max-width: 560px;
            color: var(--muted);
            font-size: clamp(16px, 2.5vw, 20px);
            line-height: 1.65;
        }

        .contact {
            margin-top: 28px;
            color: var(--text);
            font-weight: 700;
        }

        a {
            color: var(--accent);
            text-decoration: none;
        }

        a:hover {
            color: #67e8f9;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 34px;
        }

        .button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 46px;
            padding: 0 18px;
            border-radius: 14px;
            border: 1px solid var(--panel-border);
            color: var(--text);
            background: #111827;
            font-weight: 800;
        }

        .button.primary {
            color: #001016;
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent), var(--accent-dark));
        }
    </style>
</head>
<body>
    <main>
        <div class="status">Błąd {{ status_code }}</div>
        <h1>Wystąpił błąd</h1>
        <p>
            Prosimy o kontakt z administratorem na maila:
            <a href="mailto:tomaszf600@gmail.com">tomaszf600@gmail.com</a>
            albo na Messenger.
        </p>
        <p class="contact">
            Opisz krótko, co próbowałeś zrobić przed pojawieniem się błędu.
        </p>
        <div class="actions">
            <a class="button primary" href="/">Wróć na stronę główną</a>
            <a class="button" href="mailto:tomaszf600@gmail.com">Napisz maila</a>
        </div>
    </main>
</body>
</html>
