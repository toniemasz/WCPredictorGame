{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl border-t-4 border-cyan-500">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tight mb-1">Dobra, niech Ci będzie</h2>
            <p class="text-slate-400 text-sm">Zdałeś test. Ustaw nowe hasło i tym razem go nie zgub.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if error %}
            <div class="alert-error text-red-500 font-bold mb-4">
                {{ error }}
            </div>
            {% endif %}

            <div>
                <label class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" required placeholder="Twój nick" class="form-input">
            </div>

            <div>
                <label class="form-label">Nowe hasło:</label>
                <input type="password" name="new_password" required placeholder="Tym razem łatwiejsze do zapamiętania" class="form-input">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3">
                    Zmień hasło
                </button>
            </div>
        </form>

    </div>
</div>

{% endblock %}
