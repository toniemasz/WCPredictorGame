{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tight mb-1">Zaloguj się</h2>
            <p class="text-slate-400 text-xs sm:text-sm">Wprowadź swoje dane, aby uzyskać dostęp do typowania.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert-error">
                Błędna nazwa użytkownika lub hasło. Spróbuj ponownie.
            </div>
            {% endif %}

            <div>
                <label class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" required placeholder="Twoja nazwa" class="form-input">
            </div>

            <div>
                <label class="form-label">Hasło:</label>
                <input type="password" name="password" required placeholder="••••••••" class="form-input">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3">
                    Zaloguj się
                </button>
            </div>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-800 text-center text-sm text-slate-400">
            Nie masz jeszcze konta?
            <a href="/register/" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">Zarejestruj się</a>
        </div>
        <div class="mt-4 text-center text-sm">
        <a href="/forgot-password/" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">
        Zapomniałem hasła
        </a>
</div>

    </div>
</div>

{% endblock %}
