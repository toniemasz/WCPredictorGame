<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCPredictor 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style type="text/tailwindcss">
        @layer components {
            /* Główny kontener strony */
            .main-container { @apply max-w-7xl mx-auto p-4 sm:p-6; }

            /* Scentralizowany kontener na mecze/karty */
            .centered-content-wrapper { @apply max-w-4xl mx-auto w-full; }

            /* Komponenty kart */
            .wc-card { @apply bg-slate-900 border border-slate-800 rounded-2xl p-5 sm:p-6 hover:border-slate-700 transition-all duration-300 shadow-xl; }

            /* Przyciski globalne */
            .btn-base { @apply font-bold rounded-xl transition-all duration-200 text-center inline-flex items-center justify-center cursor-pointer select-none text-sm; }
            .btn-primary { @apply btn-base bg-cyan-500 text-black px-5 py-3 shadow-[0_0_15px_rgba(6,182,212,0.3)] hover:bg-cyan-400; }
            .btn-secondary { @apply btn-base bg-slate-800 border border-slate-700 text-slate-200 px-5 py-3 hover:bg-slate-700 hover:text-white; }
            .btn-danger { @apply btn-base bg-red-600/20 border border-red-500/30 text-red-400 px-4 py-2 hover:bg-red-600 hover:text-white; }
            .btn-admin { @apply btn-base bg-amber-500/10 border border-amber-500/30 hover:bg-amber-500/20 text-amber-400 px-3 py-1.5 text-xs uppercase tracking-wide; }
            .btn-purple { @apply btn-base bg-purple-600 hover:bg-purple-500 text-white px-5 py-3 shadow-[0_0_15px_rgba(147,51,234,0.4)]; }

            /* Elementy formularza */
            .form-input { @apply w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white placeholder-slate-600 focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all duration-200 text-sm; }
            .form-label { @apply block text-xs uppercase text-slate-400 font-bold mb-1.5 tracking-wider; }

            /* Formularze typowania meczu */
            .prediction-input { @apply w-14 h-11 sm:w-16 sm:h-12 text-center bg-slate-800 border border-slate-700 rounded-lg text-white text-lg sm:text-xl font-bold placeholder-slate-500 focus:border-cyan-500 outline-none transition-all; }
            .prediction-select { @apply w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-xs sm:text-sm text-white outline-none focus:border-cyan-500 transition-all; }

            /* Odznaki statusów (Badges) */
            .badge { @apply px-2.5 py-1 text-[10px] sm:text-xs rounded-full font-bold uppercase tracking-wide border; }
            .badge-scheduled { @apply badge bg-blue-500/10 border-blue-500/20 text-blue-400; }
            .badge-live { @apply badge bg-red-500/20 border-red-500/40 text-red-400 animate-pulse; }
            .badge-finished { @apply badge bg-slate-800 border-slate-700 text-slate-400; }

            /* Tabele (Leaderboard) */
            .wc-table { @apply w-full text-left border-collapse text-sm; }
            .wc-table-th { @apply p-4 text-xs font-bold uppercase tracking-wider text-slate-400 border-b border-slate-800; }
            .wc-table-td { @apply p-4 border-b border-slate-800/50 text-slate-200 font-medium; }

            /* Nawigacja menu */
            .nav-link { @apply text-slate-300 hover:text-cyan-400 font-semibold text-sm transition-colors py-2 px-1; }
            .stage-tab-active::after {
                    content: "";
                    position: absolute;
                    left: 15%;
                    right: 15%;
                    bottom: -4px;
                    height: 3px;
                    border-radius: 999px;
                    background: #22d3ee;
                    box-shadow: 0 0 12px #22d3ee;
                }
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen font-sans antialiased selection:bg-cyan-500 selection:text-black">

<nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50 shadow-lg backdrop-blur-md bg-opacity-95">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex flex-col md:flex-row justify-between items-center py-4 md:h-16 gap-4">

            <a href="/" class="text-2xl font-black text-cyan-400 tracking-tight hover:opacity-90 transition">
                WCPredictor <span class="text-white">2026</span>
            </a>

            <div class="flex flex-wrap gap-x-4 gap-y-2 items-center justify-center">
                {% if user.is_staff %}
                    <a href="{% url 'admin_dashboard' %}" class="btn-admin">
                        🛠️ Panel Admina
                    </a>
                {% endif %}
                <a href="/" class="nav-link">Home</a>
                <a href="/matches/" class="nav-link">Matches</a>
                <a href="/leaderboard/" class="nav-link">Leaderboard</a>

                {% if user.is_authenticated %}
                    <a href="/profile/" class="nav-link text-cyan-400">Profile</a>
                    <a href="/logout/" class="nav-link text-red-400 hover:text-red-300">Logout</a>
                {% else %}
                    <a href="/login/" class="nav-link text-cyan-400">Login</a>
                    <a href="/register/" class="btn-primary !px-3 !py-1.5 !text-xs">Register</a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>

<main class="main-container">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
