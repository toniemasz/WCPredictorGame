{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl border-t-4 border-cyan-500">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tight mb-1">Odzyskiwanie hasła</h2>
            <p class="text-slate-400 text-sm">
                Podaj e-mail przypisany do konta. Wyślemy kod potrzebny do ustawienia nowego hasła.
            </p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            <div>
                <label class="form-label">Adres e-mail:</label>
                <input type="email" name="email" required placeholder="twoj@email.pl" class="form-input" autocomplete="email">
            </div>

            <div class="rounded-xl border border-amber-500/30 bg-amber-500/10 px-4 py-3 text-xs text-amber-100">
                Ze względów bezpieczeństwa nie zdradzamy, czy konto z takim adresem istnieje.
            </div>

            <button type="submit" class="btn-primary w-full py-3">
                Wyślij kod
            </button>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-800 text-center text-sm text-slate-400">
            Masz już kod?
            <a href="{% url 'password_reset_stage2' %}" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">Wpisz kod i zmień hasło</a>
        </div>
    </div>
</div>

{% endblock %}
