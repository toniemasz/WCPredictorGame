{% load static %}
<form method="POST" action="{% url 'create_prediction' match.id %}"
      class="prediction-form mt-3 flex flex-col gap-3 relative">
    {% csrf_token %}

    <div class="text-center text-xs text-slate-400">Przewidywany wynik:</div>

    <div class="flex justify-center items-center gap-3 relative">
        <input type="number" name="predicted_home" required min="0" placeholder="0"
               value="{{ match.user_prediction.predicted_home|default_if_none:'' }}"
               class="w-12 h-12 text-center bg-slate-900 border border-slate-700 rounded-lg text-xl font-bold text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all">

        <span class="text-slate-500 font-bold text-xl">:</span>

        <input type="number" name="predicted_away" required min="0" placeholder="0"
               value="{{ match.user_prediction.predicted_away|default_if_none:'' }}"
               class="w-12 h-12 text-center bg-slate-900 border border-slate-700 rounded-lg text-xl font-bold text-white focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all">

        <label class="bonus-label absolute -right-2 sm:right-4 flex items-center gap-1.5 text-xs font-bold transition duration-300
            {% if match.is_bonus_locked %}text-slate-600 cursor-not-allowed opacity-40{% else %}text-amber-400 cursor-pointer hover:text-amber-300{% endif %}">
            <input type="checkbox" name="is_doubled" class="bonus-checkbox w-4 h-4 accent-amber-500 rounded"
                   {% if match.user_prediction and match.user_prediction.is_doubled %}checked{% endif %}
                   {% if match.is_bonus_locked %}disabled data-server-locked="true"{% endif %}>
            <span>★ x2</span>
        </label>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2 mt-2">
        <select name="predicted_first_team" class="bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-300 w-full outline-none focus:border-cyan-500">
            <option value="">Pierwsza bramka (drużyna)...</option>
            <option value="HOME" {% if match.user_prediction.predicted_first_team == 'HOME' %}selected{% endif %}>{{ match.home_team.name }}</option>
            <option value="AWAY" {% if match.user_prediction.predicted_first_team == 'AWAY' %}selected{% endif %}>{{ match.away_team.name }}</option>
            <option value="NONE" {% if match.user_prediction.predicted_first_team == 'NONE' %}selected{% endif %}>Brak bramek</option>
        </select>

        <select name="predicted_scorer" class="bg-slate-900 border border-slate-700 rounded-lg text-xs p-2.5 text-slate-300 w-full outline-none focus:border-cyan-500">
            <option value="">Pierwszy strzelec...</option>
            {% for player in match.available_players %}
            <option value="{{ player.name }}" {% if match.user_prediction.predicted_scorer == player.name %}selected{% endif %}>{{ player.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="save-status text-center text-xs font-bold mt-1 h-4 hidden opacity-0 transition-opacity duration-300"></div>
</form>
