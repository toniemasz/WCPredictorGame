{{% extends "base.html" %}
{% block content %}

<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl">

        <div class="text-center mb-8">
            <h2 class="text-3xl font-black tracking-tight mb-1">Utwórz Konto</h2>
            <p class="text-slate-400 text-xs sm:text-sm">Dołącz do zabawy i walcz o miano eksperta.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}

            {% if form.errors %}
            <div class="alert-error text-red-500 mb-4 p-3 bg-red-900/20 rounded">
                {% for field, errors in form.errors.items %}
                    <p class="font-bold text-sm">{{ errors|striptags }}</p>
                {% endfor %}
            </div>
            {% endif %}

            <div>
                <label class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" required placeholder="Wybierz nick" class="form-input">
            </div>

            <div>
                <label class="form-label">Adres E-mail (opcjonalnie):</label>
                <input type="email" name="email" placeholder="twoj@email.com" class="form-input">
            </div>

            <div>
                <label class="form-label">Hasło:</label>
                <input type="password" name="password" required placeholder="Minimum 8 znaków" class="form-input">
            </div>

            <div>
                <label class="form-label">Powtórz hasło:</label>
                <input type="password" name="password_confirm" required placeholder="Wpisz hasło ponownie" class="form-input">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3">
                    Zarejestruj się
                </button>
            </div>
        </form>

        <div class="mt-6 pt-5 border-t border-slate-800 text-center text-sm text-slate-400">
            Masz już konto?
            <a href="/login/" class="text-cyan-400 font-bold hover:text-cyan-300 transition-colors">Zaloguj się</a>
        </div>

    </div>
</div>

{% endblock %}
