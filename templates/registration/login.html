{% extends "base.html" %}

{% block content %}

<div class="max-w-md mx-auto">

    <h1 class="text-4xl font-bold mb-6">
        Login
    </h1>

    <form method="post"
          class="space-y-4">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="bg-cyan-500 px-4 py-2 rounded">

            Login

        </button>

    </form>

</div>

{% endblock %}
