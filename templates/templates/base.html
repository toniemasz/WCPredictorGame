<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WCPredictor 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style type="text/tailwindcss">
        @layer base {
            * { box-sizing: border-box; }
        }

        @layer components {

            /* ─── Layouty ─────────────────────────────────────────── */
            .main-container         { @apply max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-8; }
            .centered-content-wrapper { @apply max-w-4xl mx-auto w-full; }

            /* ─── Karty ───────────────────────────────────────────── */
            .wc-card {
                @apply bg-slate-900 border border-slate-800 rounded-2xl p-5 sm:p-6
                       hover:border-slate-700 transition-all duration-300 shadow-xl;
            }

            /* ─── Przyciski ───────────────────────────────────────── */
            .btn-base {
                @apply inline-flex items-center justify-center gap-2
                       font-bold rounded-xl transition-all duration-200
                       text-sm text-center cursor-pointer select-none;
            }
            .btn-primary {
                @apply btn-base bg-cyan-500 text-black px-5 py-3
                       shadow-[0_0_18px_rgba(6,182,212,0.35)]
                       hover:bg-cyan-400 hover:shadow-[0_0_24px_rgba(6,182,212,0.5)];
            }
            .btn-secondary {
                @apply btn-base bg-slate-800 border border-slate-700 text-slate-200
                       px-5 py-3 hover:bg-slate-700 hover:text-white hover:border-slate-600;
            }
            .btn-danger {
                @apply btn-base bg-red-600/10 border border-red-500/30 text-red-400
                       px-4 py-2 hover:bg-red-600 hover:text-white hover:border-red-600;
            }
            .btn-admin {
                @apply btn-base bg-amber-500/10 border border-amber-500/30 text-amber-400
                       px-3 py-1.5 text-xs uppercase tracking-wide
                       hover:bg-amber-500/20 hover:border-amber-500/50;
            }
            .btn-purple {
                @apply btn-base bg-purple-600 text-white px-5 py-3
                       shadow-[0_0_18px_rgba(147,51,234,0.4)]
                       hover:bg-purple-500 hover:shadow-[0_0_24px_rgba(147,51,234,0.55)];
            }

            /* ─── Formularze ──────────────────────────────────────── */
            .form-input {
                @apply w-full bg-slate-950 border border-slate-800 rounded-xl p-3
                       text-white placeholder-slate-600 text-sm outline-none
                       focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/50
                       transition-all duration-200;
            }
            .form-label {
                @apply block text-[10px] uppercase tracking-widest font-bold
                       text-slate-400 mb-1.5;
            }

            /* ─── Inputy typowania ────────────────────────────────── */
            .prediction-input {
                @apply w-14 h-11 sm:w-16 sm:h-12 text-center
                       bg-slate-800 border border-slate-700 rounded-xl
                       text-white text-lg sm:text-xl font-black
                       placeholder-slate-600 outline-none
                       focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/50
                       transition-all duration-200
                       [appearance:textfield] [&::-webkit-inner-spin-button]:appearance-none;
            }
            .prediction-select {
                @apply w-full bg-slate-800 border border-slate-700 rounded-xl
                       px-3 py-2.5 text-xs sm:text-sm text-white outline-none
                       focus:border-cyan-500 transition-all duration-200;
            }

            /* ─── Odznaki statusów ────────────────────────────────── */
            .badge {
                @apply inline-flex items-center gap-1.5
                       px-3 py-1 text-[10px] sm:text-[11px]
                       rounded-full font-bold uppercase tracking-widest border;
            }
            .badge-scheduled { @apply badge bg-blue-500/10 border-blue-500/20 text-blue-400; }
            .badge-live       { @apply badge bg-red-500/20 border-red-500/40 text-red-400 animate-pulse; }
            .badge-finished   { @apply badge bg-slate-800 border-slate-700 text-slate-400; }

            /* ─── Tabela (Leaderboard) ────────────────────────────── */
            .wc-table    { @apply w-full text-left border-collapse text-sm; }
            .wc-table-th {
                @apply px-4 py-3.5 text-[10px] font-bold uppercase tracking-widest
                       text-slate-500 border-b border-slate-800 bg-slate-950/40;
            }
            .wc-table-td {
                @apply px-4 py-3.5 border-b border-slate-800/50 text-slate-200 font-medium;
            }

            /* ─── Nawigacja ───────────────────────────────────────── */
            .nav-link {
                @apply text-slate-300 hover:text-cyan-400 font-semibold text-sm
                       transition-colors duration-150 py-1;
            }

            /* ─── Zakładki faz ────────────────────────────────────── */
            .tab-base {
                @apply whitespace-nowrap px-4 py-2 rounded-xl text-xs sm:text-sm font-bold
                       uppercase tracking-wide transition-all duration-200 border;
            }
            .tab-active {
                @apply bg-cyan-500 text-black border-transparent
                       shadow-[0_0_15px_rgba(6,182,212,0.4)];
            }
            .tab-inactive {
                @apply bg-slate-900 text-slate-400 border-slate-800
                       hover:text-white hover:border-slate-700;
            }

            /* ─── Kurs bukmacherski ───────────────────────────────── */
            .odds-chip {
                @apply bg-slate-950 border border-slate-800 rounded-lg
                       px-3 py-1.5 text-center min-w-[52px] transition-colors
                       hover:border-amber-500/40;
            }
            .odds-label { @apply text-[9px] font-bold uppercase tracking-widest text-slate-600 block mb-0.5; }
            .odds-value { @apply text-amber-400 font-extrabold text-sm; }

            /* ─── Wynik meczu ─────────────────────────────────────── */
            .score-display {
                @apply text-4xl sm:text-5xl font-black tracking-tighter
                       bg-gradient-to-b from-white to-slate-400
                       text-transparent bg-clip-text;
            }

            /* ─── Prediction result box ───────────────────────────── */
            .result-good   { @apply bg-green-500/10 border border-green-500/30 rounded-xl; }
            .result-ok     { @apply bg-amber-500/10 border border-amber-500/30 rounded-xl; }
            .result-bad    { @apply bg-red-500/10  border border-red-500/30  rounded-xl; }
            .result-neutral{ @apply bg-slate-950   border border-slate-800   rounded-xl; }

            /* ─── Info / komunikaty ───────────────────────────────── */
            .alert-success { @apply p-4 rounded-xl bg-cyan-500/15 border border-cyan-500/30 text-cyan-400 text-sm font-semibold; }
            .alert-error   { @apply p-4 rounded-xl bg-red-500/15  border border-red-500/30  text-red-400  text-sm font-semibold; }
        }
    </style>
</head>

<body class="bg-slate-950 text-white min-h-screen font-sans antialiased selection:bg-cyan-500 selection:text-black">

<nav class="bg-slate-900/95 border-b border-slate-800 sticky top-0 z-50 shadow-lg backdrop-blur-md">
    <div class="max-w-7xl mx-auto px-4 sm:px-6">
        <div class="flex flex-col md:flex-row justify-between items-center py-3 md:h-16 gap-3">

            <a href="/" class="text-2xl font-black text-cyan-400 tracking-tight hover:opacity-90 transition shrink-0">
                WCPredictor <span class="text-white">2026</span>
            </a>

            <div class="flex flex-wrap gap-x-5 gap-y-2 items-center justify-center">
                {% if user.is_staff %}
                    <a href="{% url 'admin_dashboard' %}" class="btn-admin">
                        🛠️ Panel Admina
                    </a>
                {% endif %}
                <a href="/" class="nav-link">Home</a>
                <a href="/matches/" class="nav-link">Matches</a>
                <a href="/leaderboard/" class="nav-link">Leaderboard</a>

                {% if user.is_authenticated %}
                    <a href="/profile/" class="nav-link text-cyan-400">Profile</a>
                    <a href="/logout/" class="nav-link text-red-400 hover:text-red-300">Logout</a>
                {% else %}
                    <a href="/login/" class="nav-link text-cyan-400">Login</a>
                    <a href="/register/" class="btn-primary !px-3 !py-1.5 !text-xs">Register</a>
                {% endif %}
            </div>

        </div>
    </div>
</nav>

<main class="main-container">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
