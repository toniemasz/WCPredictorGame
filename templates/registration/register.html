{% extends "base.html" %}

{% block content %}

<div class="min-h-[80vh] flex items-center justify-center">

<div class="w-full max-w-lg">

    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-10 shadow-2xl">

        <div class="text-center mb-8">

            <h1 class="text-4xl font-bold mb-3">
                Create Account
            </h1>

            <p class="text-slate-400">
                Join the World Cup Predictor
            </p>

        </div>

        <form
            method="POST"
            enctype="multipart/form-data"
            class="space-y-5">

            {% csrf_token %}

            <div>

                <label class="block mb-2 text-sm text-slate-300">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:border-cyan-500 focus:outline-none">

            </div>

            <div>

                <label class="block mb-2 text-sm text-slate-300">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:border-cyan-500 focus:outline-none">

            </div>

            <div>

                <label class="block mb-2 text-sm text-slate-300">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:border-cyan-500 focus:outline-none">

            </div>

            <div>

                <label class="block mb-2 text-sm text-slate-300">
                    Confirm Password
                </label>

                <input
                    type="password"
                    name="password_confirm"
                    required
                    class="w-full px-4 py-3 bg-slate-950 border border-slate-700 rounded-xl text-white focus:border-cyan-500 focus:outline-none">

            </div>

            <div>

                <label class="block mb-2 text-sm text-slate-300">
                    Avatar
                </label>

                <input
                    type="file"
                    name="avatar"
                    accept="image/*"
                    class="block w-full text-sm text-slate-300">

            </div>

            <button
                type="submit"
                class="w-full bg-cyan-500 hover:bg-cyan-400 text-black font-bold py-3 rounded-xl transition">

                Create Account

            </button>

        </form>

    </div>

</div>


</div>

{% endblock %}
