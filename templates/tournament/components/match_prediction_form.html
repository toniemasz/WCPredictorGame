{% load static %}
<div class="flex flex-col gap-3 mt-2">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-2">
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-0.5">1. Bramka (drużyna):</label>
            <select name="predicted_first_team" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2 text-slate-300 outline-none focus:border-cyan-500 transition-colors">
                <option value="">Wybierz...</option>
                <option value="HOME" {% if match.user_prediction.predicted_first_team == 'HOME' %}selected{% endif %}>{{ match.home_team.display_name|default:match.home_team.name }}</option>
                <option value="AWAY" {% if match.user_prediction.predicted_first_team == 'AWAY' %}selected{% endif %}>{{ match.away_team.display_name|default:match.away_team.name }}</option>
                <option value="NONE" {% if match.user_prediction.predicted_first_team == 'NONE' %}selected{% endif %}>Brak bramek</option>
            </select>
        </div>
        <div>
            <label class="text-[10px] font-bold text-slate-500 uppercase tracking-wider block mb-0.5">Pierwszy strzelec:</label>
            <select name="predicted_scorer" class="w-full bg-slate-900 border border-slate-700 rounded-lg text-xs p-2 text-slate-300 outline-none focus:border-cyan-500 transition-colors">
                <option value="">Wybierz zawodnika...</option>
                <option value="NO_SCORER" {% if match.user_prediction.predicted_scorer == 'NO_SCORER' %}selected{% endif %}>Brak strzelca</option>
                {% for player in match.available_players %}
                <option value="{{ player.name }}" {% if match.user_prediction.predicted_scorer == player.name %}selected{% endif %}>
                    {{ player.display_label }}
                </option>
                {% endfor %}
            </select>
        </div>
    </div>

    <div class="flex justify-between items-center pt-2 border-t border-slate-800/40 mt-1">
        <div class="text-[11px] text-slate-500 font-bold">
            {% if not match.user_prediction.is_doubled %}
                <span class="bonus-counter-text px-2 py-0.5 rounded-full border bg-slate-900/60 border-slate-800 text-slate-400">
                    {% if match.bonus_remaining == 0 %}Brak bonusów{% elif match.bonus_remaining == 1 %}Ostatni bonus!{% else %}{{ match.bonus_remaining }} bonusy{% endif %}
                </span>
            {% endif %}
        </div>

        <label class="bonus-label flex items-center gap-2 text-xs font-bold transition duration-300 select-none
            {% if match.is_bonus_locked %}
                text-slate-600 cursor-not-allowed opacity-40
            {% else %}
                text-amber-400 cursor-pointer hover:text-amber-300
            {% endif %}">
            <input type="checkbox" name="is_doubled"
                   class="bonus-checkbox w-4 h-4 accent-amber-500 rounded border-slate-700 bg-slate-900 focus:ring-0"
                   {% if match.user_prediction and match.user_prediction.is_doubled %}checked{% endif %}
                   {% if match.is_bonus_locked %}disabled data-server-locked="true"{% endif %}>
            <span>Bonus x2 ★</span>
        </label>
    </div>
</div>
