{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto my-10 sm:my-16">
    <div class="wc-card shadow-2xl">
        <div class="text-center mb-6">
            <h2 class="text-3xl font-black tracking-tight">Zaloguj się</h2>
            <p class="text-slate-400 text-xs sm:text-sm mt-1">Wprowadź swoje dane, aby uzyskać dostęp do typowania.</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            {% if form.errors %}
            <div class="p-3 bg-red-500/20 border border-red-500/40 rounded-xl text-xs sm:text-sm text-red-400 font-medium">
                Błędna nazwa użytkownika lub hasło. Spróbuj ponownie.
            </div>
            {% endif %}

            <div>
                <label class="form-label">Nazwa użytkownika:</label>
                <input type="text" name="username" required placeholder="Twoja nazwa" class="form-input">
            </div>

            <div>
                <label class="form-label">Hasło:</label>
                <input type="password" name="password" required placeholder="••••••••" class="form-input">
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary w-full py-3">
                    Zaloguj się
                </button>
            </div>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-800 text-center text-sm text-slate-400">
            Nie masz jeszcze konta? <a href="/register/" class="text-cyan-400 font-bold hover:underline">Zarejestruj się</a>
        </div>
    </div>
</div>
{% endblock %}
